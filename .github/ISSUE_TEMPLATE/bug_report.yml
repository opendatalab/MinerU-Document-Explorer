name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `qmd collection add ...`
        2. Run `qmd query "..."`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.

  - type: dropdown
    id: interface
    attributes:
      label: Interface
      options:
        - CLI
        - MCP Server
        - SDK (library)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. macOS 15.3, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: "e.g. Node 22.12, Bun 1.2.5"
    validations:
      required: true
