name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what use case does it enable?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Include example commands or API if applicable.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Search / Retrieval
        - Document Reading (doc_toc, doc_read, doc_grep)
        - Wiki / Knowledge Ingestion
        - CLI
        - MCP Server
        - SDK / Library
        - New Document Format
        - Other
    validations:
      required: true
